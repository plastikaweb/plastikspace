@let width = dimensions()?.width;
@let height = dimensions()?.height;
@let src = this.src();

<div class="absolute inset-0 flex items-center justify-center bg-transparent rounded-lg">
  @if (isLoading()) {
    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-tertiary-600"></div>
  }

  @if (hasError()) {
    <div class="image-error flex h-full w-full items-center justify-center bg-neutral-50">
      <mat-icon class="scale-200">image_not_supported</mat-icon>
    </div>
  }
</div>

@if (src) {
  @if (width && height) {
    @if (lcpImage()) {
      <ng-container *ngTemplateOutlet="fixedImage; context: { priority: true }"></ng-container>
    } @else {
      <ng-container *ngTemplateOutlet="fixedImage; context: { priority: false }"></ng-container>
    }
  } @else {
    @if (lcpImage()) {
      <ng-container *ngTemplateOutlet="fillImage; context: { priority: true }"></ng-container>
    } @else {
      <ng-container *ngTemplateOutlet="fillImage; context: { priority: false }"></ng-container>
    }
  }

  <ng-template #fixedImage let-priority="priority">
    <img
      class="object-cover my-sub transition-opacity duration-300"
      [class.opacity-0]="isLoading()"
      [class.opacity-100]="!isLoading() && !hasError()"
      [priority]="priority"
      [ngSrc]="src"
      [width]="width"
      [height]="height"
      [alt]="title()"
      [loaderParams]="{ width, height, quality: quality() }"
      (load)="onImageLoad()"
      (error)="onImageError()" />
  </ng-template>

  <ng-template #fillImage let-priority="priority">
    <img
      fill
      class="object-cover w-full max-h-auto my-sub transition-opacity duration-300"
      [class.opacity-0]="isLoading()"
      [class.opacity-100]="!isLoading() && !hasError()"
      [priority]="priority"
      [ngSrc]="src"
      [alt]="title()"
      (load)="onImageLoad()"
      (error)="onImageError()" />
  </ng-template>
}
