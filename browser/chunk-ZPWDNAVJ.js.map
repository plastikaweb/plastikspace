<form
  class="flex flex-col w-full gap-1 mt"
  novalidate
  [formGroup]="form"
  (ngSubmit)="onSubmit($event)">
  <!-- form -->
  <formly-form
    class="form-container"
    [fields]="fields()"
    [form]="form"
    [model]="mutableModel()"
    [options]="options"
    (modelChange)="onModelChange($event)" />

  <ng-content select=".extra-links" />

  <button
    mat-flat-button
    type="submit"
    data-test="submit-button"
    title="Submit"
    [class]="'w-full sm:w-auto ' + (config().buttonStyle || '')"
    [class.sr-only!]="!config().submitAvailable"
    [disabled]="!form.valid"
    [attr.aria-label]="(config().label | translate) || 'Submit'">
    {{ (config().label | translate) || 'Submit' }}
  </button>
</form>
