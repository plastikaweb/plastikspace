name: CI
on:
  pull_request:
  push:
    branches:
      - develop

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Needed for nx-set-shas when run on the main branch
permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  develop:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'

      # Start Nx Cloud without distribution for simpler setup
      # - run: npx nx-cloud start-ci-run --distribute-on="3 linux-medium-js"
      - run: yarn install --immutable --network-timeout 1000000

      - uses: nrwl/nx-set-shas@v4

      # Format check
      - run: npx nx-cloud record -- nx format:check --all

      # Run affected tasks excluding llecoop-firebase
      - name: Run Affected Tasks
        run: |
          yarn i18n:validate
          yarn markdownlint
          npx nx-cloud record -- nx affected --target=lint --exclude=llecoop-firebase --parallel=3
          npx nx-cloud record -- nx affected --target=test --exclude=llecoop-firebase --parallel=3 --coverage
          npx nx-cloud record -- nx affected --target=build --exclude=llecoop-firebase --parallel=3
        if: always()

      - name: Report Coverage
        id: coverage
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const globber = await glob.create('coverage/**/coverage-summary.json');
            const files = await globber.glob();

            console.log(`Found ${files.length} coverage summary files.`);

            if (files.length === 0) {
              console.log('No coverage summary files found. Setting total_coverage to 0');
              core.setOutput('total_coverage', '0');
              return;
            }

            let totalLines = { total: 0, covered: 0 };
            let totalStatements = { total: 0, covered: 0 };
            let totalFunctions = { total: 0, covered: 0 };
            let totalBranches = { total: 0, covered: 0 };

            let markdown = '## Test Coverage Report\n\n';
            markdown += '| Project | Lines | Statements | Branches | Functions |\n';
            markdown += '|---|---|---|---|---|\n';

            for (const file of files) {
              try {
                const content = JSON.parse(fs.readFileSync(file, 'utf8'));
                const total = content.total;

                if (!total) {
                  console.log(`Skipping ${file}: no total coverage data found.`);
                  continue;
                }

                const dir = path.dirname(file);
                const relativePath = path.relative(process.cwd(), dir);
                const projectName = relativePath.replace(/^coverage\//, '');

                const linesPct = total.lines.pct;
                const stmtsPct = total.statements.pct;
                const branchesPct = total.branches.pct;
                const funcsPct = total.functions.pct;

                markdown += `| ${projectName} | ${linesPct}% | ${stmtsPct}% | ${branchesPct}% | ${funcsPct}% |\n`;

                totalLines.total += total.lines.total;
                totalLines.covered += total.lines.covered;
                totalStatements.total += total.statements.total;
                totalStatements.covered += total.statements.covered;
                totalFunctions.total += total.functions.total;
                totalFunctions.covered += total.functions.covered;
                totalBranches.total += total.branches.total;
                totalBranches.covered += total.branches.covered;
              } catch (err) {
                console.error(`Error processing ${file}:`, err);
              }
            }

            const calcPct = (covered, total) => total === 0 ? 0 : Number(((covered / total) * 100).toFixed(2));

            const finalLinesPct = calcPct(totalLines.covered, totalLines.total);
            const finalStmtsPct = calcPct(totalStatements.covered, totalStatements.total);
            const finalBranchesPct = calcPct(totalBranches.covered, totalBranches.total);
            const finalFuncsPct = calcPct(totalFunctions.covered, totalFunctions.total);

            markdown += `| **Total** | **${finalLinesPct}%** | **${finalStmtsPct}%** | **${finalBranchesPct}%** | **${finalFuncsPct}%** |\n`;

            console.log(`Calculated Total Coverage: ${finalLinesPct}%`);
            core.setOutput('total_coverage', finalLinesPct.toString());

            console.log(markdown);

            if (context.eventName === 'pull_request') {
              const { owner, repo } = context.repo;
              const issue_number = context.issue.number;

              const comments = await github.rest.issues.listComments({
                owner,
                repo,
                issue_number,
              });

              const botComment = comments.data.find(c => c.body.startsWith('## Test Coverage Report'));

              if (botComment) {
                await github.rest.issues.updateComment({
                  owner, repo, comment_id: botComment.id, body: markdown
                });
              } else {
                await github.rest.issues.createComment({
                  owner, repo, issue_number, body: markdown
                });
              }
            }

      - name: Update Coverage Badge
        if: (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main') && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ secrets.COVERAGE_GIST_ID }}
          filename: coverage-badge.json
          label: coverage
          message: ${{ steps.coverage.outputs.total_coverage }}%
          valColorRange: ${{ steps.coverage.outputs.total_coverage }}
          maxColorRange: 100
          minColorRange: 0
