name: Eco Store deploy staging

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches:
      - develop

permissions:
  contents: read
  deployments: write

env:
  YARN_IMMUTABLE: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Detect changes
        id: changes
        env:
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          PREV_SHA=$(git rev-parse "${TARGET_SHA}^" 2>/dev/null || echo "")
          if [ -z "$PREV_SHA" ]; then
            echo "::warning::Unable to resolve previous commit; defaulting to deploy."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --name-only "$PREV_SHA" "$TARGET_SHA" > changed_files.txt
          echo "Changed files between $PREV_SHA and $TARGET_SHA:" || true
          cat changed_files.txt || true

          if grep -E '^(apps/eco-store/|libs/eco-store/|libs/shared/|libs/core/)' changed_files.txt > /dev/null; then
            echo "Changes detected in app related paths."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No app related changes detected."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip deploy (no changes)
        if: steps.changes.outputs.has_changes != 'true'
        run: echo 'Skipping deploy because no related files changed.'

      - name: Setup Node.js
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Install dependencies
        if: steps.changes.outputs.has_changes == 'true'
        run: yarn install --immutable --network-timeout 1000000

      - name: Build application
        if: steps.changes.outputs.has_changes == 'true'
        run: yarn nx build eco-store --configuration=staging --skip-nx-cache

      - name: Generate Security Headers
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          cat <<EOF > ./dist/apps/eco-store/browser/_headers
          /*
            X-Frame-Options: DENY
            X-Content-Type-Options: nosniff
            Referrer-Policy: strict-origin-when-cross-origin
            Strict-Transport-Security: max-age=31536000; includeSubDomains; preload
            Permissions-Policy: camera=(), microphone=(), geolocation=()
            Content-Security-Policy: default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://eco-botiga.pockethost.io; connect-src 'self' https://eco-botiga.pockethost.io; frame-ancestors 'none'; upgrade-insecure-requests;
          EOF

      - name: Deploy to Cloudflare Pages
        if: steps.changes.outputs.has_changes == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: eco-store-staging
          directory: ./dist/apps/eco-store/browser
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: develop
