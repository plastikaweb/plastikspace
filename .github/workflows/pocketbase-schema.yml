name: PocketBase Staging Schema Management

on:
  push:
    branches: [develop]
    paths:
      - 'apps/eco-store/pocketbase/**'
      - 'apps/eco-store/scripts/**'

  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - sync
          - export

jobs:
  sync-schema:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'sync')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Sync Schema to PocketBase
        run: node apps/eco-store/scripts/sync-pocketbase-schema.js
        env:
          POCKETBASE_STAGING_ADMIN_EMAIL: ${{ secrets.POCKETBASE_STAGING_ADMIN_EMAIL }}
          POCKETBASE_STAGING_ADMIN_PASSWORD: ${{ secrets.POCKETBASE_STAGING_ADMIN_PASSWORD }}

      - name: Deploy Hooks to PocketBase via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.POCKETBASE_STAGING_SFTP_HOST }}
          username: ${{ secrets.POCKETBASE_STAGING_SFTP_USERNAME }}
          password: ${{ secrets.POCKETBASE_STAGING_SFTP_PASSWORD }}
          # ssh_private_key is marked required in the action definition but ignored if password is used.
          # We provide an empty string to satisfy the validator.
          ssh_private_key: ''
          local_path: './apps/eco-store/pocketbase/pb_hooks'
          remote_path: '/pb_hooks'
          sftp_only: true
          delete_remote_files: true

  export-schema:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'export'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Export Schema from PocketBase
        run: node apps/eco-store/scripts/export-pocketbase-schema.js
        env:
          POCKETBASE_STAGING_ADMIN_EMAIL: ${{ secrets.POCKETBASE_STAGING_ADMIN_EMAIL }}
          POCKETBASE_STAGING_ADMIN_PASSWORD: ${{ secrets.POCKETBASE_STAGING_ADMIN_PASSWORD }}

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add apps/eco-store/pocketbase/pb_schema.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update PocketBase schema [skip ci]"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
