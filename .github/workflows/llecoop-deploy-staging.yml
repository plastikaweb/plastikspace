name: Llecoop deploy staging

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches:
      - develop

permissions:
  contents: read

env:
  YARN_IMMUTABLE: true

jobs:
  on-success:
    runs-on: ubuntu-latest

    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Detect llecoop changes
        id: changes
        env:
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          PREV_SHA=$(git rev-parse "${TARGET_SHA}^" 2>/dev/null || echo "")
          if [ -z "$PREV_SHA" ]; then
            echo "::warning::Unable to resolve previous commit; defaulting to deploy."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --name-only "$PREV_SHA" "$TARGET_SHA" > changed_files.txt
          echo "Changed files between $PREV_SHA and $TARGET_SHA:" || true
          cat changed_files.txt || true

          if grep -E '^(apps/llecoop/|libs/llecoop/|libs/shared/|libs/core/)' changed_files.txt >/dev/null; then
            echo "Changes detected in llecoop related paths."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No llecoop related changes detected."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip deploy (no llecoop changes)
        if: steps.changes.outputs.has_changes != 'true'
        run: echo 'Skipping deploy because no llecoop related files changed.'

      - name: Set up Node.js
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Install dependencies and build
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          yarn install --immutable --network-timeout 1000000
          yarn nx build llecoop --configuration=staging --skip-nx-cache

      - name: Set up FTP
        if: steps.changes.outputs.has_changes == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.LLECOOP_FTP_SERVER }}
          username: ${{ secrets.LLECOOP_STAGING_FTP_USERNAME }}
          password: ${{ secrets.LLECOOP_STAGING_FTP_PASSWORD }}
          local-dir: ./dist/apps/llecoop/browser/
