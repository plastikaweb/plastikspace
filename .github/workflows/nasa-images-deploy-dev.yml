name: Nasa Images deploy development

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches:
      - develop

permissions:
  contents: read

env:
  YARN_IMMUTABLE: true

jobs:
  on-success:
    runs-on: ubuntu-latest

    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Detect nasa-images changes
        id: changes
        env:
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          PREV_SHA=$(git rev-parse "${TARGET_SHA}^" 2>/dev/null || echo "")
          if [ -z "$PREV_SHA" ]; then
            echo "::warning::Unable to resolve previous commit; defaulting to deploy."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --name-only "$PREV_SHA" "$TARGET_SHA" > changed_files.txt
          echo "Changed files between $PREV_SHA and $TARGET_SHA:" || true
          cat changed_files.txt || true

          if grep -E '^(apps/nasa-images/|libs/nasa-images/|libs/shared/|libs/core/)' changed_files.txt >/dev/null; then
            echo "Changes detected in nasa-images related paths."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No nasa-images related changes detected."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip deploy (no nasa-images changes)
        if: steps.changes.outputs.has_changes != 'true'
        run: echo 'Skipping deploy because no nasa-images related files changed.'

      - name: Setup Node.js
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Install dependencies
        if: steps.changes.outputs.has_changes == 'true'
        run: yarn install --immutable --network-timeout 1000000

      - name: Build application
        if: steps.changes.outputs.has_changes == 'true'
        run: yarn nx build nasa-images --configuration=development --skip-nx-cache

      - name: Deploy to GitHub Pages
        if: steps.changes.outputs.has_changes == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/apps/nasa-images
          publish_branch: nasa-images-staging-page

  on-failure:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Display failure information
        run: |
          echo "::error::The triggering workflow failed"
          echo "Workflow name: ${{ github.event.workflow_run.name }}"
          echo "Workflow ID: ${{ github.event.workflow_run.id }}"
          echo "Workflow run number: ${{ github.event.workflow_run.run_number }}"
          echo "Workflow conclusion: ${{ github.event.workflow_run.conclusion }}"
          echo "Branch: ${{ github.event.workflow_run.head_branch }}"
          echo "Commit SHA: ${{ github.event.workflow_run.head_sha }}"
          echo "Commit message: ${{ github.event.workflow_run.head_commit.message }}"
          echo "Workflow URL: ${{ github.event.workflow_run.html_url }}"
