@if (routeInfo$ | ngrxPush; as info) {
  @defer {
    <h2 class="gap-sm h3 mb-4 flex items-center" data-test="page-title">
      <mat-icon class="scale-150"> {{ info.icon }} </mat-icon> <span>{{ info.title }}</span>
    </h2>
  }
}

<section class="faqs-wrapper">
  @defer {
    <mat-accordion class="mx-xl my-md">
      @for (faq of faqs$ | ngrxPush; track $index) {
        <mat-expansion-panel data-test="faq-item">
          <mat-expansion-panel-header>
            <mat-panel-title>
              <p class="h5" data-test="faq-question">{{ faq.question }}</p>
            </mat-panel-title>
            <mat-panel-description></mat-panel-description>
          </mat-expansion-panel-header>
          <div data-test="faq-answer" [innerHTML]="faq.answer"></div>
        </mat-expansion-panel>
      }
    </mat-accordion>
  }
</section>
