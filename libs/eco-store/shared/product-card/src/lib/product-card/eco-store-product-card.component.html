<mat-card
  class="product-card group relative flex h-full w-full flex-col justify-between overflow-hidden transition-all ring-1! ring-neutral-100! duration-200 hover:ring-neutral-200! hover:shadow-2xl!"
  appearance="raised"
  role="article"
  [attr.aria-label]="product().name">
  <!-- Favorite Button -->
  <button
    matIconButton
    class="favorite-button absolute! top-3 right-3 z-100!"
    [aria-label]="'products.favorite' | translate: { value: product().name }"
    (click)="toggleFavorite.emit(product().id)">
    <mat-icon aria-hidden="true">favorite</mat-icon>
  </button>

  <!-- Image -->
  <div class="relative isolate mb-4 aspect-square w-full">
    <div class="flex h-full w-full items-center justify-center">
      <plastik-shared-img-container
        class="h-full w-full object-cover transition-all duration-300 group-hover:scale-105 group-hover:contrast-110"
        [src]="getPocketBaseUrl(product())"
        [title]="product().name"
        [dimensions]="{ width: 300, height: 300 }"
        [lcpImage]="isFirst()" />
    </div>
  </div>

  <!-- Content Section -->
  <mat-card-content class="flex grow flex-col space-y-2 p-4">
    <!-- Category with Color -->
    <div class="flex items-center gap-2">
      <div class="h-2 w-2 rounded-full" [style.background-color]="product().categoryColor"></div>
      <div
        class="text-[11px] font-bold uppercase tracking-wider"
        [style.color]="product().categoryColor">
        {{ product().categoryName }}
      </div>
    </div>

    <!-- Title -->
    <h3 class="min-h-9 text-lg font-bold leading-tight text-gray-900 line-clamp-2">
      {{ product().name }}
    </h3>

    <!-- Price -->
    <div class="space-y-1">
      <div class="mt-1 flex items-baseline gap-1">
        <span class="text-[clamp(1.5rem,4vw,2rem)] font-extrabold text-gray-900"
          >{{ product().priceWithIva | number: '1.2-2' }} €</span
        >
        <span class="text-sm font-medium text-gray-500"
          >/ {{ 'products.unit-type.' + product().unitType | translate }}</span
        >
      </div>

      <!-- Price per unit badge -->
      <mat-chip
        [attr.aria-label]="
          `products.unit.${product().unitType}` | translate: { value: product().unitBase }
        ">
        <mat-icon matChipAvatar aria-hidden="true">info</mat-icon>
        {{ 'products.unit.' + product().unitType | translate: { value: product().unitBase } }}
      </mat-chip>
    </div>
  </mat-card-content>

  <!-- Action Button Section -->
  <mat-card-actions class="mt-5">
    <eco-store-product-card-quantity-control
      [product]="product()"
      [quantity]="quantity()"
      (quantityChange)="onQuantityChange($event)"></eco-store-product-card-quantity-control>
  </mat-card-actions>
</mat-card>
