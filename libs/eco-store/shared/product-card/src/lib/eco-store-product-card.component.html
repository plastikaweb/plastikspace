@let productData = product()!;

<mat-card
  appearance="outlined"
  role="article"
  class="product-card group relative flex h-full w-full flex-col justify-between overflow-hidden transition-all ring-1! ring-neutral-100! duration-200 hover:ring-neutral-200! hover:shadow-2xl!"
  [class.pointer-events-none]="!productData.stock"
  [routerLink]="
    productData ? ['/botiga', productData.categorySlug, productData.normalizedName] : null
  "
  [attr.aria-label]="productData ? productData.name : 'Loading item'">
  @if (productData) {
    <!-- Favorite Button -->
    @if (!minimalVersion()) {
      <eco-store-shared-favorite-button
        class="absolute! top-3 right-3 z-100!"
        [isFavorite]="false"
        [ariaLabel]="'products.favorite' | translate: { value: productData.name }"
        (toggleFavorite)="onToggleFavorite($event)" />
    }

    <!-- Image -->
    <div class="relative isolate mb-4 aspect-square w-full">
      <div class="flex h-full w-full items-center justify-center">
        <plastik-img-container
          class="h-full w-full object-cover transition-all duration-300 group-hover:scale-105 group-hover:contrast-110"
          [src]="productData | pocketBaseImageUrl: productData.images?.[0]"
          [title]="productData.name"
          [dimensions]="{ width: 300, height: 300 }"
          [lcpImage]="isFirst()" />
      </div>
    </div>

    <!-- Content Section -->
    <mat-card-content class="flex grow flex-col space-y-2 p-4">
      <!-- Category -->
      <eco-store-product-category-label
        size="sm"
        [name]="productData.categoryName"
        [color]="productData.categoryColor" />

      <!-- Title -->
      <h3 class="min-h-9 text-lg font-bold leading-tight text-gray-900 line-clamp-2">
        {{ productData.name }}
      </h3>

      <!-- Price -->
      <eco-store-product-price
        size="md"
        [price]="productData.priceWithIva"
        [unitType]="productData.unitType"
        [unitBase]="productData.unitBase" />
    </mat-card-content>

    <!-- Action Button Section -->
    @if (!minimalVersion()) {
      <mat-card-actions class="mt-5">
        <eco-store-product-quantity-control
          [product]="productData"
          [quantity]="quantity()"
          (quantityChange)="onQuantityChange($event)"></eco-store-product-quantity-control>
      </mat-card-actions>
    }
  }
</mat-card>
