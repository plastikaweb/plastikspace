<button
  mat-icon-button
  type="button"
  [class]="'favorite-button backdrop-blur-3xl bg-primary-100/50! size-' + size()"
  [class.is-favorite]="isFavorite()"
  [attr.aria-label]="ariaLabel()"
  (click)="onToggle($event)">
  <mat-icon>
    {{ isFavorite() ? 'favorite' : 'favorite_border' }}
  </mat-icon>
</button>
