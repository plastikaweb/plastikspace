@if (!individualButton()) {
  <button
    matButton="filled"
    type="button"
    class="add-button group-hover:border-primary-400! flex w-full items-center justify-center gap-1 drop-shadow-none! transition-all group-hover:border! group-hover:drop-shadow-sm!"
    (click)="onIncrementClick($event)">
    <mat-icon class="scale-120" aria-hidden="true">shopping_basket</mat-icon>
    <span>{{ 'products.quantity.add' | translate }}</span>
  </button>
} @else {
  <div class="flex w-full items-center" [class.gap-4]="mode() === 'detail'">
    <div
      class="quantity-controls border-primary-200 flex items-center justify-between rounded-2xl border py-1 pr-1 pl-1 transition-all"
      role="group"
      [class.bg-primary-50]="mode() !== 'detail'"
      [class.bg-white]="mode() === 'detail'"
      [class.w-full]="mode() === 'card'"
      [class.w-auto]="mode() === 'detail'"
      [class.sm:w-48]="mode() === 'detail'"
      [attr.aria-label]="
        'common.a11y.productQuantity' | translate: { product: product().name, quantity: quantity() }
      ">
      <button
        matIconButton
        type="button"
        [disabled]="(mode() === 'detail' || mode() === 'summary') && quantity() <= minLimit()"
        [attr.aria-label]="
          (quantity() <= minLimit() && mode() === 'card'
            ? 'products.quantity.remove'
            : 'products.quantity.decrement'
          ) | translate: { value: product().name }
        "
        [class]="
          quantity() <= minLimit() && mode() === 'card' ? 'remove-button' : 'decrement-button'
        "
        (click)="onDecrementClick($event)">
        @if (quantity() <= minLimit() && mode() === 'card') {
          <mat-icon aria-hidden="true">delete_outline</mat-icon>
        } @else {
          <mat-icon aria-hidden="true">remove</mat-icon>
        }
      </button>

      <div class="flex items-baseline justify-center gap-1 not-first-of-type:cursor-text">
        <label class="sr-only" [attr.for]="'qty-' + product().id">
          {{
            'common.a11y.productQuantity'
              | translate: { product: product().name, quantity: quantity() }
          }}
        </label>

        <input
          #qtyInput
          matInput
          disabled
          readonly
          tabindex="-1"
          type="number"
          class="no-spinners w-fit cursor-default border-none text-end font-bold text-neutral-700 focus:outline-none"
          [id]="'qty-' + product().id"
          [value]="quantity()"
          [step]="step()"
          [min]="minLimit()"
          [max]="maxLimit()"
          [attr.aria-label]="
            'common.a11y.productQuantity'
              | translate: { product: product().name, quantity: quantity() }
          "
          (change)="onManualInput($event)"
          (keydown.enter)="qtyInput.blur()" />
        <span class="text-md text-neutral-600" aria-hidden="true">{{
          `products.unit.abbr.${product().unitType}` | translate
        }}</span>
      </div>

      <button
        matIconButton
        type="button"
        class="increment-button"
        [disabled]="quantity() >= maxLimit()"
        [attr.aria-label]="`${('products.quantity.increment' | translate)} ${product().name}`"
        [attr.aria-disabled]="quantity() >= maxLimit()"
        [class.opacity-50]="quantity() >= maxLimit()"
        (click)="onIncrementClick($event)">
        <mat-icon aria-hidden="true">add</mat-icon>
      </button>
    </div>

    @if (mode() === 'detail') {
      <button
        matButton="filled"
        class="add-button detail-button flex grow items-center justify-center gap-1 tracking-wide uppercase"
        [disabled]="!isQuantityModified()"
        (click)="onAddToCart()">
        <mat-icon class="scale-125">shopping_cart</mat-icon>
        <span class="hidden sm:block">{{ 'products.quantity.addLong' | translate }}</span>
        <span class="block sm:hidden">{{ 'products.quantity.add' | translate }}</span>
      </button>
    }
  </div>
}
