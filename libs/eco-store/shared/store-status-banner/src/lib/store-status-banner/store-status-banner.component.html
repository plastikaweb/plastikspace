<div
  [class]="`${status().toLowerCase()}-container flex min-h-14 items-center justify-between rounded-xl px-6 py-3`">
  <div class="flex items-center gap-2 overflow-hidden">
    <mat-icon>{{ icon() }}</mat-icon>
    <div class="flex flex-col justify-center overflow-hidden">
      <strong class="truncate text-sm font-bold text-ellipsis whitespace-nowrap"
        >{{ title() | translate }}
      </strong>
      <span class="truncate text-sm text-ellipsis whitespace-nowrap">{{
        description().key | translate: description().params
      }}</span>
    </div>
  </div>
  <div class="flex items-center gap-2">
    @if (status() === 'CLOSED' || status() === 'OPENING_SOON') {
      <plastik-countdown
        class="ml-2 text-sm font-bold"
        [segments]="segments()"
        [prefix]="'store.status.opensIn'">
      </plastik-countdown>
    }
    <button
      matIconButton
      [attr.aria-label]="'store.status.statusBanner.dismiss' | translate"
      (click)="dismiss.emit()">
      <mat-icon>close</mat-icon>
    </button>
  </div>
</div>
