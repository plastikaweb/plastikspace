<mat-toolbar role="banner">
  <div
    class="content-container bg-from mx-auto flex flex-row items-center justify-between gap-2 sm:gap-4">
    <div class="flex items-center justify-start gap-2">
      @if (isMobile() && hasSidenav()) {
        <button
          mat-icon-button
          class="flex justify-center align-middle"
          data-test="toggle-sidenav-button"
          [attr.aria-label]="
            (sideNavOpen() ? 'common.a11y.closeSidenav' : 'common.a11y.openSidenav') | translate
          "
          (click)="toggleSidenav.emit()">
          @if (!sideNavOpen()) {
            <mat-icon>menu</mat-icon>
          } @else {
            <mat-icon>close</mat-icon>
          }
        </button>
      }

      <eco-tenant-link [tenant]="tenant()" />

      @if (storeStatus() !== 'OPEN') {
        @defer (when storeStatus() !== 'OPEN') {
          <eco-store-store-window
            class="w-74"
            [status]="storeStatus()"
            [nextOpenDate]="nextOpenDate()"
            [is24h]="is24h()"
            [isMobile]="isMobile()"
            [closedReason]="closedReason()" />
        } @placeholder {
          <div aria-hidden="true" class="h-8 w-74 animate-pulse rounded bg-neutral-200"></div>
        }
      }

      <div class="hidden h-full items-center md:flex">
        <ng-content select="[primaryMenu]" />
      </div>
    </div>

    <!-- @defer (when formConfig()) {
      @let getFormConfig = formConfig()!.getConfig();
      @let getSubmitFormConfig = formConfig()!.getSubmitFormConfig?.() || {};

      <plastik-shared-form-feature
        [fields]="getFormConfig"
        [model]="{ query: '' }"
        [submitConfig]="getSubmitFormConfig"
        (changeEvent)="submitEvent.emit($event)"></plastik-shared-form-feature>
    } -->

    <div class="hidden h-full items-center md:flex">
      <ng-content select="[secondaryMenu]" />
    </div>
  </div>
</mat-toolbar>
