<mat-toolbar class="shadow-sm" role="banner">
  <div class="mx-auto content-container flex gap-4 md:gap-12 flex-row items-center">
    <button matButton routerLink="/" type="button" class="w-[250px] p-0! m-0! h-auto">
      <h1
        class="truncate flex items-center gap-2 max-w-[250px] font-semibold tracking-wide text-primary-500">
        @if (tenant()?.logo) {
          <plastik-img-container
            class="object-cover w-10 h-10"
            [src]="tenant() | pocketBaseImageUrl: tenant()?.logo"
            [title]="tenant()?.name || 'Botiga Eco'"
            [dimensions]="{ width: 40, height: 40 }"></plastik-img-container>
        } @else {
          <mat-icon class="header-icon" aria-hidden="true">eco_logo</mat-icon>
        }

        <span class="hidden md:block">{{ tenant()?.name || 'Botiga Eco' }}</span>
      </h1>
    </button>

    <div class="flex h-full items-center">
      <ng-content select="[primaryMenu]" />
    </div>

    @defer (when formConfig()) {
      @let getFormConfig = formConfig()!.getConfig();
      @let getSubmitFormConfig = formConfig()!.getSubmitFormConfig?.() || {};

      <plastik-shared-form-feature
        [fields]="getFormConfig"
        [model]="{ query: '' }"
        [submitConfig]="getSubmitFormConfig"
        (changeEvent)="onSubmit($event)"></plastik-shared-form-feature>
    }

    <ng-content select="[secondaryMenu]" />
  </div>
</mat-toolbar>
