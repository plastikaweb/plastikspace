<ng-template #primaryMenu>
  <nav
    class="main-menu flex h-full items-center"
    [attr.aria-label]="'common.a11y.mainNavigation' | translate">
    <ul class="flex flex-row items-center justify-start gap-4">
      <li
        class="flex items-center"
        routerLinkActive="active-menu-item"
        [routerLinkActiveOptions]="{ exact: true }">
        <a
          mat-button
          routerLink="/"
          [attr.aria-current]="this.currentUrl() === '/' ? 'page' : null">
          {{ 'store.menu.home' | translate }}
        </a>
      </li>
      <li class="flex items-center" routerLinkActive="active-menu-item">
        <a
          mat-button
          routerLink="/botiga"
          [attr.aria-current]="this.currentUrl().startsWith('/botiga') ? 'page' : null">
          {{ 'store.menu.store' | translate }}
        </a>
      </li>
      <li class="flex items-center" routerLinkActive="active-menu-item">
        <a
          mat-button
          routerLink="/about-us"
          [attr.aria-current]="this.currentUrl().startsWith('/about-us') ? 'page' : null">
          {{ 'store.menu.about' | translate }}
        </a>
      </li>
    </ul>
  </nav>
</ng-template>

<ng-template #secondaryMenu>
  <nav [attr.aria-label]="'common.a11y.userActions' | translate">
    <ul class="flex flex-row items-center gap-4">
      <li>
        <button
          matIconButton
          type="button"
          routerLink="/favorits"
          class="favorite-icon-button"
          [aria-label]="'store.menu.viewFavorites' | translate"
          [matTooltip]="'store.menu.viewFavorites' | translate">
          <mat-icon aria-hidden="true">favorite</mat-icon>
        </button>
      </li>

      <li>
        @let user = profileStore.user();
        @if (user) {
          <button
            #profileButton
            mat-button
            class="user-pill"
            type="button"
            [matMenuTriggerFor]="userMenuComponent()?.menu() ?? null"
            [aria-label]="'store.menu.profile' | translate: { name: user?.name }">
            <div class="flex items-center gap-2">
              <eco-user-avatar [user]="user" [initials]="profileStore.userInitials()" />
              <span class="hidden font-medium sm:inline-block">{{
                'store.menu.hello' | translate: { name: profileStore.userFirstName() }
              }}</span>
            </div>
          </button>

          @defer (on hover(profileButton), interaction(profileButton); prefetch on idle) {
            <eco-user-menu #userMenuComponent (logoutEvent)="logout()" />
          } @placeholder {
            <div class="hidden"></div>
          }
        } @else {
          <button
            matIconButton
            type="button"
            [aria-label]="'store.menu.login' | translate"
            [matTooltip]="'store.menu.login' | translate"
            (click)="login()">
            <mat-icon aria-hidden="true">account_circle</mat-icon>
          </button>
        }
      </li>

      <li>
        <button
          matButton="filled"
          type="button"
          routerLink="/cistella"
          class="cart-button flex items-center gap-2"
          [routerLinkActive]="'active'"
          [aria-label]="
            'store.menu.viewCart'
              | translate
                : {
                    productCount: cartStore.itemsCount(),
                    productPrice: cartStore.subtotal() + cartStore.tax() | currency,
                  }
          "
          [matBadge]="cartStore.itemsCount()"
          [matTooltip]="
            'store.menu.viewCart'
              | translate
                : {
                    productCount: cartStore.itemsCount(),
                    productPrice: cartStore.subtotal() + cartStore.tax() | currency,
                  }
          "
          [class.bump]="bumpAnimation()">
          <mat-icon class="m-0!" aria-hidden="true">shopping_cart</mat-icon>
          <span class="hidden sm:block!">{{
            cartStore.subtotal() + cartStore.tax() | currency
          }}</span>
        </button>
      </li>
    </ul>
  </nav>
</ng-template>
