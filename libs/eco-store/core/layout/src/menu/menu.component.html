<ng-template #primaryMenu>
  <nav
    class="flex h-full items-center main-menu"
    [attr.aria-label]="'a11y.main-navigation' | translate">
    <ul class="flex flex-row justify-start items-center gap-4">
      <li class="flex items-center">
        <a
          mat-button
          routerLink="/"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          [attr.aria-current]="this.currentUrl() === '/' ? 'page' : null">
          {{ 'menu.home' | translate }}
        </a>
      </li>
      <li class="flex items-center">
        <a
          mat-button
          routerLink="/botiga"
          routerLinkActive="active"
          [attr.aria-current]="this.currentUrl().startsWith('/botiga') ? 'page' : null">
          {{ 'menu.store' | translate }}
        </a>
      </li>
      <li class="flex items-center">
        <a
          mat-button
          routerLink="/about-us"
          routerLinkActive="active"
          [attr.aria-current]="this.currentUrl().startsWith('/about-us') ? 'page' : null">
          {{ 'menu.about' | translate }}
        </a>
      </li>
    </ul>
  </nav>
</ng-template>

<ng-template #secondaryMenu>
  <nav [attr.aria-label]="'a11y.user-actions' | translate">
    <ul class="flex flex-row items-center gap-4">
      <li>
        <button matIconButton type="button" [aria-label]="'menu.view-favorites' | translate">
          <mat-icon aria-hidden="true">favorite</mat-icon>
        </button>
      </li>
      <li>
        <button
          matButton="filled"
          type="button"
          routerLink="/cistella"
          class="cart-button"
          [aria-label]="
            'menu.view-cart'
              | translate
                : {
                    productCount: cartStore.itemsCount(),
                    productPrice: cartStore.totalAmountWithIva() | currency,
                  }
          "
          [matBadge]="cartStore.itemsCount()"
          [class.bump]="bumpAnimation()">
          <mat-icon aria-hidden="true">shopping_cart</mat-icon>
          <span>{{ cartStore.totalAmountWithIva() | currency }}</span>
        </button>
      </li>
      <li>
        @if (profileStore.isAuthenticated()) {
          @let user = profileStore.user();

          @if (user?.avatar) {
            <ng-container *ngTemplateOutlet="avatarMenu; context: { $implicit: user }" />
          } @else {
            <ng-container *ngTemplateOutlet="initialsMenu; context: { $implicit: user }" />
          }
        } @else {
          <button
            matIconButton
            type="button"
            [aria-label]="'menu.login' | translate"
            (click)="login()">
            <mat-icon aria-hidden="true">account_circle</mat-icon>
          </button>
        }
      </li>
    </ul>
  </nav>
</ng-template>

<ng-template #avatarMenu let-user>
  <button
    matIconButton
    type="button"
    [aria-label]="'menu.profile' | translate: { name: user?.name }">
    <plastik-img-container
      class="w-6 h-6 rounded-full object-cover overflow-hidden"
      [src]="user | pocketBaseImageUrl: user.avatar"
      [title]="user?.name || 'Avatar'"
      [dimensions]="{ width: 24, height: 24 }" />
  </button>
</ng-template>

<ng-template #initialsMenu let-user>
  <button
    matIconButton
    class="bg-primary-50!"
    type="button"
    [aria-label]="'menu.profile' | translate: { name: user?.name }">
    <span class="text-sm block m-0 font-bold">{{ profileStore.userInitials() }}</span>
  </button>
</ng-template>
