@if (tenant()?.logo) {
  <plastik-img-container
    class="relative block h-8 w-8 shrink-0"
    [src]="tenant() | pocketBaseImageUrl: tenant()?.logo"
    [title]="''"
    [dimensions]="{ height: 32, width: 32 }"
    [thumbSizes]="[60, 200]"
    [lcpImage]="true"></plastik-img-container>
} @else {
  <mat-icon aria-hidden="true">eco_logo</mat-icon>
}

<span class="text-primary-500 font-semibold tracking-wide">
  {{ tenant()?.name || 'store.title' | translate }}
</span>
