<footer class="w-90% mb-24 py-6 backdrop-blur-sm lg:mb-0" role="contentinfo">
  <mat-toolbar>
    <div class="content-container mx-auto flex flex-row items-center justify-center gap-2 md:gap-4">
      <span>{{ tenant()?.name || ('store.title' | translate) }}</span>
      @if (tenant()?.logo) {
        <plastik-img-container
          class="h-5 w-5 object-cover"
          [src]="tenant() | pocketBaseImageUrl: tenant()?.logo"
          [title]="tenant()?.name || ('store.title' | translate)"
          [dimensions]="{ width: 20, height: 20 }"></plastik-img-container>
      } @else {
        <mat-icon role="img" [attr.aria-label]="'common.a11y.ecoIcon' | translate"
          >eco_logo</mat-icon
        >
      }
      <span>www.plastikaweb.com</span>
      <span>2026</span>

      <!-- <nav class="flex items-center justify-between gap-4">
        <a routerLink="/legal/privacy">Privacy Policy</a>
        <a routerLink="/legal/terms">Terms of Use</a>
        <a routerLink="/legal/cookies">Cookie Policy</a>
      </nav> -->
    </div>
  </mat-toolbar>
</footer>
