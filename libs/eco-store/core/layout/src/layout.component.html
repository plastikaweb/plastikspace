<div class="mx-auto grid h-screen w-screen grid-rows-[auto_auto_1fr_auto]">
  <eco-header
    class="z-1000"
    [formConfig]="searchFormConfig"
    [tenant]="tenantStore.tenant()"
    [storeStatus]="tenantStore.storeStatus()"
    [nextOpenDate]="tenantStore.nextOpenDate()"
    [is24h]="tenantStore.is24h()"
    [closedReason]="tenantStore.closedReasonTranslated()"
    (submitEvent)="onSearchSubmit($event)">
    <ng-container primaryMenu [ngTemplateOutlet]="menu.primaryMenu()" />
    <ng-container secondaryMenu [ngTemplateOutlet]="menu.secondaryMenu()" />
  </eco-header>

  <mat-sidenav-container class="content-container mx-auto h-full w-full overflow-auto">
    <mat-sidenav
      #sidenav
      mode="side"
      fixedInViewport="true"
      fixedTopGap="100"
      fixedBottomGap="85"
      position="start"
      class="eco-sidenav"
      [opened]="isSidenavOpen()">
      <router-outlet
        name="sidenav"
        (activate)="isSidenavOpen.set(true)"
        (deactivate)="isSidenavOpen.set(false)"></router-outlet>
    </mat-sidenav>
    <mat-sidenav-content #sidenavContent class="px-6" id="mainContent" role="main" tabindex="-1">
      @if (
        (tenantStore.storeStatus() === 'CLOSED' ||
          tenantStore.storeStatus() === 'CANCELLED' ||
          tenantStore.storeStatus() === 'OPENING_SOON' ||
          tenantStore.storeStatus() === 'CLOSING_SOON' ||
          tenantStore.storeStatus() === 'CLOSED_MANUALLY') &&
        !isBannerDismissed()
      ) {
        <eco-store-status-banner
          class="mt-8"
          [status]="tenantStore.storeStatus()"
          [nextOpenDate]="tenantStore.nextOpenDate()"
          [closedReason]="tenantStore.closedReasonTranslated()"
          (dismiss)="isBannerDismissed.set(true)">
        </eco-store-status-banner>
      }

      <router-outlet></router-outlet>
    </mat-sidenav-content>
  </mat-sidenav-container>

  <eco-footer></eco-footer>
</div>

<eco-menu #menu />
