<div class="mx-auto flex h-screen w-screen flex-col">
  <eco-header
    [formConfig]="searchFormConfig"
    [tenant]="tenantStore.tenant()"
    [storeStatus]="tenantStore.storeStatus()"
    [nextOpenDate]="tenantStore.nextOpenDate()"
    [is24h]="tenantStore.is24h()"
    [closedReason]="tenantStore.closedReasonTranslated()"
    [sideNavOpen]="isSidenavOpen()"
    [isMobile]="isMobile()"
    [hasSidenav]="hasSidenav()"
    (toggleSidenav)="isSidenavOpen.set(!isSidenavOpen())"
    (submitEvent)="onSearchSubmit()">
    <ng-container primaryMenu [ngTemplateOutlet]="menu.primaryMenu()" />
    <ng-container secondaryMenu [ngTemplateOutlet]="menu.secondaryMenu()" />
  </eco-header>

  <mat-sidenav-container class="content-container w-full flex-1 bg-transparent">
    <mat-sidenav
      #sidenav
      position="start"
      fixedInViewport="true"
      [mode]="isMobile() ? 'over' : 'side'"
      [fixedTopGap]="isMobile() ? 0 : 70"
      [fixedBottomGap]="isMobile() ? 0 : 100"
      [opened]="isSidenavOpen()"
      (keydown.escape)="isSidenavOpen.set(false)"
      (closedStart)="isSidenavOpen.set(false)">
      @if (isMobile()) {
        <div class="flex items-center justify-between border-b border-neutral-200 px-4 py-3">
          <eco-tenant-logo showName="always" [tenant]="tenantStore.tenant()" />
          <button
            mat-icon-button
            [attr.aria-label]="'common.a11y.closeSidenav' | translate"
            (click)="isSidenavOpen.set(false)">
            <mat-icon>close</mat-icon>
          </button>
        </div>
      }

      <div class="h-full overflow-y-auto">
        <router-outlet
          name="sidenav"
          (activate)="hasSidenav.set(true); !isMobile() && isSidenavOpen.set(true)"
          (deactivate)="hasSidenav.set(false); isSidenavOpen.set(false)"></router-outlet>
      </div>
    </mat-sidenav>

    <mat-sidenav-content #sidenavContent class="flex flex-col px-4 pb-10 md:px-8" tabindex="-1">
      <main id="mainContent" role="main" class="flex-1">
        @if (shouldShowBanner() && !isBannerDismissed()) {
          <eco-store-status-banner
            class="mt-8"
            [status]="tenantStore.storeStatus()"
            [nextOpenDate]="tenantStore.nextOpenDate()"
            [closedReason]="tenantStore.closedReasonTranslated()"
            (dismiss)="isBannerDismissed.set(true)">
          </eco-store-status-banner>
        }

        <router-outlet></router-outlet>
      </main>
      <eco-footer [tenant]="tenantStore.tenant()" />
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>

<eco-menu #menu />
