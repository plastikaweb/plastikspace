<div class="grid grid-rows-[auto_1fr_auto] h-screen w-screen mx-auto">
  <eco-header class="z-1000" [formConfig]="searchFormConfig" (submitEvent)="onSearchSubmit($event)">
    <ng-container primaryMenu [ngTemplateOutlet]="menu.primaryMenu()" />
    <ng-container secondaryMenu [ngTemplateOutlet]="menu.secondaryMenu()" />
  </eco-header>

  <mat-sidenav-container class="h-full w-full content-container overflow-auto mx-auto">
    <mat-sidenav
      #sidenav
      mode="side"
      fixedInViewport="true"
      fixedTopGap="100"
      fixedBottomGap="85"
      position="start"
      class="eco-sidenav"
      [opened]="isSidenavOpen()">
      <router-outlet
        name="sidenav"
        (activate)="isSidenavOpen.set(true)"
        (deactivate)="isSidenavOpen.set(false)"></router-outlet>
    </mat-sidenav>
    <mat-sidenav-content #sidenavContent class="px-6" id="mainContent" role="main" tabindex="-1">
      <router-outlet></router-outlet>
    </mat-sidenav-content>
  </mat-sidenav-container>

  <eco-footer></eco-footer>
</div>

<eco-menu #menu />
