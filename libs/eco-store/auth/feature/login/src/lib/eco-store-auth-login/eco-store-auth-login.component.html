<div class="relative flex min-h-screen items-center justify-center bg-neutral-50 p-4">
  <mat-card
    appearance="raised"
    class="from-primary-100 to-primary-200 text-primary-800 w-full max-w-[425px] border-2! border-white! bg-linear-to-br shadow-lg!">
    <mat-card-header class="mb-4 flex flex-col items-center gap-4 pt-8 pb-4">
      <div class="text-primary mb-2 rounded-full bg-white p-4 shadow-md">
        <mat-icon class="scale-150">eco</mat-icon>
      </div>
      <mat-card-title class="m-0 text-center font-bold tracking-tight">
        {{ 'auth.login.title' | translate }}
      </mat-card-title>
      <mat-card-subtitle class="text-title-small text-center font-medium">
        {{ 'auth.login.subtitle' | translate }}
      </mat-card-subtitle>
    </mat-card-header>

    <mat-card-content class="bg-white/75 py-6! backdrop-blur">
      <plastik-shared-form-feature
        [fields]="facade.formConfig.getConfig()"
        [submitConfig]="facade.formConfig.getSubmitFormConfig?.() ?? null"
        (changeEvent)="facade.onSubmit($event)">
        <div class="extra-links my-4 flex items-center justify-center">
          <a
            matButton
            class="text-secondary! text-sm! font-medium! normal-case!"
            routerLink="/recuperar-contrasenya">
            {{ 'auth.login.recoverAccess' | translate }}
            <mat-icon aria-hidden="true" iconPositionEnd class="ml-1 scale-90 align-middle"
              >passkey</mat-icon
            >
          </a>
        </div>
      </plastik-shared-form-feature>

      <div class="border-primary-100 my-4 flex items-center justify-center gap-2 border-t py-2">
        <span class="text-sm text-neutral-500">{{ 'auth.login.newUserQuestion' | translate }}</span>
        <a
          matButton
          class="text-primary! min-w-0! px-2! text-sm! font-bold! normal-case!"
          routerLink="/activar-compte">
          {{ 'auth.login.createAccount' | translate }}
          <mat-icon aria-hidden="true" iconPositionEnd class="ml-1 scale-90 align-middle"
            >verified_user</mat-icon
          >
        </a>
      </div>
    </mat-card-content>

    <mat-card-footer class="border-primary-200 border-t p-4 text-center">
      <p class="text-xs text-neutral-500">
        {{ 'auth.login.termsPrivacy' | translate }}
      </p>
    </mat-card-footer>
  </mat-card>
</div>
