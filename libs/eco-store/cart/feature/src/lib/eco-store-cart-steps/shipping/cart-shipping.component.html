<div class="grid grid-cols-1 gap-8 py-8 lg:grid-cols-3">
  <!-- Left Column: Shipping Details -->
  <div class="space-y-10 lg:col-span-2">
    <section>
      <h2 class="mb-2 text-2xl font-bold text-neutral-900">
        {{ 'cart.steps.shipping.title' | translate }}
      </h2>

      <plastik-shared-form-feature
        [fields]="formConfig.getConfig()"
        [submitConfig]="formConfig.getSubmitFormConfig?.() || {}"
        [model]="{}"
        (temporaryChangeEvent)="onShippingMethodChange($event)"
        (validChange)="onFormValidChange($event)">
      </plastik-shared-form-feature>
    </section>

    <!-- Shipping Address Section -->
    <!-- <button mat-stroked-button class="w-full py-6 rounded-xl border-dashed border-neutral-300 text-neutral-600 bg-neutral-50 hover:bg-neutral-100 flex items-center justify-start px-6 gap-2">
      <mat-icon>add</mat-icon>
      Add New Address
   </button> -->
  </div>

  <!-- Right Column: Order Summary -->
  <div class="sticky top-4 space-y-6 self-start lg:col-span-1">
    <eco-cart-order-summary
      [subtotal]="cartStore.subtotal()"
      [taxes]="cartStore.tax()"
      [shipping]="cartStore.shipping()"
      [deliveryType]="cartStore.method() ?? 'pickup'"
      [total]="cartStore.total()"
      [isStoreOpen]="tenantStore.isStoreOpen()"
      [nextOpenDate]="tenantStore.nextOpenDate()"
      [actionButtonText]="'cart.shipping.goToConfirmation'"
      [actionRoute]="['../confirmacio']"
      [submitAvailable]="formValid()">
      <div extra-shipping-content>
        @if (cartStore.method() === 'delivery') {
          <eco-cart-order-price-slots
            class="my-6 px-2"
            [cartTotal]="cartStore.subtotal() + cartStore.tax()"
            [tiers]="tenantStore.getTenantDeliveryPriceTiers()">
          </eco-cart-order-price-slots>
        }
      </div>
    </eco-cart-order-summary>
  </div>
</div>
