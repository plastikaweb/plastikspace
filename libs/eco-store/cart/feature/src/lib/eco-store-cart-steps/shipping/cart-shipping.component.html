<div class="grid grid-cols-1 lg:grid-cols-3 gap-8 py-8">
  <!-- Left Column: Shipping Details -->
  <div class="lg:col-span-2 space-y-10">
    <section>
      <h2 class="text-2xl font-bold text-neutral-900 mb-2">
        {{ 'cart.steps.shipping.title' | translate }}
      </h2>

      <plastik-shared-form-feature
        [fields]="formConfig.getConfig()"
        [submitConfig]="formConfig.getSubmitFormConfig?.() || {}"
        [model]="{}"
        (temporaryChangeEvent)="onShippingMethodChange($event)"
        (validChange)="onFormValidChange($event)">
      </plastik-shared-form-feature>
    </section>

    <!-- Shipping Address Section -->
    <!-- <button mat-stroked-button class="w-full py-6 rounded-xl border-dashed border-neutral-300 text-neutral-600 bg-neutral-50 hover:bg-neutral-100 flex items-center justify-start px-6 gap-2">
      <mat-icon>add</mat-icon>
      Add New Address
   </button> -->
  </div>

  <!-- Right Column: Order Summary -->
  <div class="lg:col-span-1 space-y-6 sticky top-4 self-start">
    <eco-cart-order-summary
      [subtotal]="cartStore.totalAmount()"
      [taxes]="cartStore.totalAmountIva()"
      [shipping]="cartStore.shippingAmount()"
      [deliveryType]="cartStore.shippingMethod() ?? 'pickup'"
      [total]="cartStore.totalAmountWithShipping()"
      [actionButtonText]="'cart.shipping.go-to-confirmation'"
      [actionRoute]="['../confirmacio']"
      [submitAvailable]="formValid()">
      <div extra-shipping-content>
        @if (cartStore.shippingMethod() === 'delivery') {
          <eco-cart-order-price-slots
            class="my-6 px-2"
            [cartTotal]="cartStore.totalAmountWithIva()"
            [tiers]="tenantService.getTenantDeliveryPriceTiers()">
          </eco-cart-order-price-slots>
        }
      </div>
    </eco-cart-order-summary>
  </div>
</div>
