<div class="cart-container min-h-screen px-4 py-4">
  <mat-stepper
    linear
    aria-label="Checkout steps"
    [selectedIndex]="selectedStepIndex()"
    (selectionChange)="onStepChange($event)">
    @for (step of steps; track step.route; let i = $index) {
      <mat-step>
        <ng-template matStepLabel>{{ `${step.label}.title` | translate }}</ng-template>
      </mat-step>
    }
  </mat-stepper>

  <router-outlet />
</div>
