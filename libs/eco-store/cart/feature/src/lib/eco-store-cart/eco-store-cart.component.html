<div class="cart-container min-h-screen p-0! md:p-4">
  <mat-stepper
    linear
    labelPosition="bottom"
    [orientation]="stepperOrientation()"
    [attr.aria-label]="'cart.steps.title' | translate"
    [selectedIndex]="selectedStepIndex()"
    (selectionChange)="onStepChange($event)">
    @for (step of steps; track step.route; let i = $index) {
      <mat-step>
        <ng-template matStepLabel>{{ `${step.label}.title` | translate }}</ng-template>
      </mat-step>
    }
  </mat-stepper>

  <router-outlet />
</div>
