<div
  class="mb-2 grid grid-cols-[auto_1fr] items-center gap-2 rounded-md border px-3 py-2"
  [class.border-primary-200]="isPriceDrop()"
  [class.bg-primary-50]="isPriceDrop()"
  [class.border-tertiary-200]="!isPriceDrop()"
  [class.bg-tertiary-50]="!isPriceDrop()"
  [attr.role]="isPriceDrop() ? 'status' : 'alert'"
  [attr.aria-label]="
    (isPriceDrop() ? 'cart.summary.priceDrop' : 'cart.summary.priceIncrease') | translate
  ">
  <mat-icon aria-hidden="true" [class]="isPriceDrop() ? 'icon-drop' : 'icon-increase'">
    {{ isPriceDrop() ? 'trending_down' : 'trending_up' }}
  </mat-icon>
  <div class="flex flex-col gap-1 sm:flex-row sm:items-center sm:gap-2">
    <strong
      class="text-sm"
      [class.font-bold]="isPriceDrop()"
      [class.text-primary-900]="isPriceDrop()"
      [class.font-medium]="!isPriceDrop()"
      [class.text-tertiary-900]="!isPriceDrop()">
      {{ (isPriceDrop() ? 'cart.summary.priceDrop' : 'cart.summary.priceIncrease') | translate }}
    </strong>
    <p
      class="text-xs"
      [class.text-primary-800]="isPriceDrop()"
      [class.text-tertiary-800]="!isPriceDrop()">
      {{ 'cart.summary.oldPrice' | translate }}
      <span class="line-through opacity-70">{{ oldPrice() | currency: 'EUR' }}</span>
    </p>
  </div>
</div>
