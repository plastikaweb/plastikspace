<div class="px-4 py-8" role="region">
  <!-- Header Section -->
  <div class="flex items-center justify-between w-full mb-8">
    <h2 class="text-3xl font-bold text-tertiary-700 tracking-tight flex items-center gap-md">
      <mat-icon class="scale-150!" aria-hidden="true">
        {{ category()?.icon }}
      </mat-icon>
      <span>{{ category()?.name }}</span>
      <span class="text-lg font-medium text-gray-400">({{ store.count() }})</span>
    </h2>

    <plastik-sort-selector
      [options]="store.sortOptions()"
      [currentSort]="store.sort()"
      [translationPrefix]="'products.filter.sort'"
      (sortChange)="sortProducts($event)"></plastik-sort-selector>
  </div>

  <!-- Products Grid -->
  <!-- first 7 items in high screens are marked for LCP -->
  <section class="products-grid" [attr.aria-label]="'a11y.product-list' | translate">
    @for (item of store.productsWithCategoryName(); track item.id; let i = $index) {
      <eco-store-product-card
        [product]="item"
        [isFirst]="i < 7"
        (addToCart)="addToCart($event)"
        (toggleFavorite)="toggleFavorite($event)"></eco-store-product-card>
    }
  </section>

  <plastik-pagination
    class="mt-6"
    plastikPocketbasePaginationNavigation
    [pageSize]="store.getPagination().perPage"
    [pageIndex]="store.getPagination().page"
    [pageSizeOptions]="store.paginationSizeOptions()"
    [count]="store.count()" />
</div>
