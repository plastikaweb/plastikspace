<mat-form-field appearance="fill" class="w-full" subscriptSizing="dynamic" floatLabel="always">
  <mat-label class="sr-only">{{ props.label }}</mat-label>
  <mat-icon matPrefix class="mr-2" aria-hidden="true">search</mat-icon>
  <input
    matInput
    type="text"
    [autocomplete]="props['autocomplete'] || 'off'"
    [formControl]="formControl"
    [formlyAttributes]="field"
    [maxLength]="props.maxLength || 256"
    [minLength]="props.minLength || 1"
    [placeholder]="props.placeholder || ''"
    [required]="props.required || false"
    (input)="triggerPartialSearch($event)"
    (keyup)="!props.noButton ? triggerPartialSearch($event) : triggerSearch($event)" />

  @if (!props.noButton) {
    <button
      matIconButton
      matSuffix
      type="button"
      [attr.aria-label]="'form.search' | translate"
      [disabled]="isDisabled()"
      (click)="triggerSearch($event)">
      <mat-icon aria-hidden="true">search</mat-icon>
    </button>
  }
  @if (props.resetSearch && formControl.value) {
    <button
      class="reset-search-button -left-2"
      matIconButton
      matSuffix
      type="button"
      [attr.aria-label]="'form.clear' | translate"
      [disabled]="isDisabled()"
      (click)="resetSearch()">
      <mat-icon>clear</mat-icon>
    </button>
  }
</mat-form-field>
