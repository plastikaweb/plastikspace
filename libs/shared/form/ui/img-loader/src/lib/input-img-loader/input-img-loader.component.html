<div
  class="border-gray-40 relative flex items-center justify-center overflow-hidden rounded-lg border-2 border-dashed outline-none"
  tabindex="0"
  [style.height.px]="imgHeight()"
  [style.width.px]="imgWidth()"
  [class.disabled]="disabled()"
  [attr.aria-label]="'Pujar Imatge' + (value() ? ' (actualment: ' + value() + ')' : '')"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave($event)"
  (drop)="onDrop($event)">
  <!-- loading indicator -->
  <div
    class="bg-gray-10 pointer-events-none absolute inset-0 z-20 flex h-full w-full flex-col items-center justify-center rounded-lg opacity-0 transition-all duration-150"
    [ngClass]="{ 'opacity-100': isLoading() }">
    <output
      class="absolute z-20 w-full text-center text-sm font-bold text-white"
      [attr.aria-label]="`Progress de pujada ${progress() || 0}%`"
      [attr.aria-live]="'polite'"
      >{{ progress() || 0 }}%</output
    >
    <mat-progress-spinner
      class="z-20"
      mode="determinate"
      [value]="progress() || 0"
      [attr.aria-label]="`Progress de pujada ${progress() || 0}%`"></mat-progress-spinner>
    <div class="absolute h-full w-full bg-black opacity-80"></div>
  </div>

  <!-- on drag and drop indicator -->
  <div
    class="bg-gray-10 absolute inset-0 z-10 flex flex-col items-center justify-center rounded-lg opacity-0 transition-all duration-150"
    style="pointer-events: none"
    [ngClass]="{ 'opacity-100': isDragOver() }">
    <mat-icon class="m-0 h-20 w-20 p-0 text-[75px]">upload</mat-icon>
    <span class="text-center text-sm text-balance">Suelta la imagen aquí</span>
  </div>

  <!-- image load button and drag and drop instructions -->
  @if (!value() && !isLoading()) {
    <div class="bg-gray-10 m-0 flex h-full w-full flex-col items-center justify-center p-0">
      <mat-icon class="m-0 h-20 w-20 p-0 text-[75px]">upload</mat-icon>
      <span class="text-center text-sm text-balance">Arrastra una imatge</span>
      <span class="text-center text-sm text-balance">o</span>
      <button
        type="button"
        mat-button
        class="w-full sm:w-auto"
        [disabled]="disabled()"
        (click)="inputFile.click()"
        (keydown.enter)="inputFile.click()">
        <mat-icon class="text-lg">image</mat-icon>
        Cerca una imatge
      </button>
    </div>
  }

  <!-- image preview -->
  @if (value() && cdnUrl() && !isLoading()) {
    <plastik-img-container
      class="absolute top-0 right-0 bottom-0 left-0 rounded-lg"
      [src]="cdnUrl() || ''"
      [dimensions]="dimensions()"
      [title]="title() || ''"
      [lcpImage]="lcpImage()">
    </plastik-img-container>
    <div
      class="px-sub absolute right-0 bottom-0 left-0 flex items-center justify-between rounded-b-lg bg-white/90 py-0"
      tabindex="0"
      (focus)="firstActionBtn?.focus()">
      <p class="grow truncate text-sm font-bold">{{ title() || '' }}</p>
      <div class="flex items-center">
        <button
          #firstActionBtn
          type="button"
          mat-icon-button
          [attr.aria-label]="`Editar imatge ${title()}`"
          [disabled]="disabled()"
          (click)="inputFile.click()"
          (keydown.enter)="inputFile.click()">
          <mat-icon class="text-lg">edit</mat-icon>
        </button>
        <button
          #secondActionBtn
          type="button"
          mat-icon-button
          [attr.aria-label]="`Eliminar imatge ${title()}`"
          [disabled]="disabled()"
          (click)="onDeleteFile($event)"
          (keydown.enter)="onDeleteFile($event)">
          <mat-icon class="text-lg">delete</mat-icon>
        </button>
      </div>
    </div>
  }
</div>

<!-- file input -->
<input
  #inputFile
  aria-label="file"
  type="file"
  accept="image/*"
  class="hidden"
  [disabled]="disabled()"
  (change)="onSelectFile($event)" />
