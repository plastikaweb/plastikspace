<mat-form-field appearance="outline" class="w-full">
  <mat-label>{{ props.label }}</mat-label>
  <mat-select panelClass="select-with-icons-panel" class="flex!" [formControl]="formControl">
    <mat-select-trigger>
      @if (selectedOption(); as selected) {
        <div
          class="flex items-center gap-2"
          [class.select-type-warning]="selected.type === 'warning'"
          [class.select-type-success]="selected.type === 'success'"
          [class.select-type-error]="selected.type === 'error'">
          <mat-icon>{{ selected.icon }}</mat-icon>
          <span class="text-sm! font-bold">{{ selected.label }}</span>
        </div>
      }
    </mat-select-trigger>

    @for (option of props.options; track option.value) {
      <mat-option
        [value]="option.value"
        [class.select-type-warning]="option.type === 'warning'"
        [class.select-type-success]="option.type === 'success'"
        [class.select-type-error]="option.type === 'error'">
        <div class="flex items-center gap-2">
          <mat-icon>{{ option.icon }}</mat-icon>
          <span>{{ option.label }}</span>
        </div>
      </mat-option>
    }
  </mat-select>
</mat-form-field>
