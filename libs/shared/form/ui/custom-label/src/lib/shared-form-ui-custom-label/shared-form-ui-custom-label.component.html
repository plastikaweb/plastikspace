<div [class]="setContainerClasses()">
  @if (props.icon && props.description) {
    <mat-icon
      [class]="'text-4xl size-4 cursor-pointer mx-2 overflow-visible ' + props.iconClasses"
      [attr.aria-label]="props.description | translate">
      {{ props.icon }}
    </mat-icon>
  }

  @if (props.key) {
    <label [attr.for]="props.key" [class]="props.labelClasses">{{ props.label | translate }}</label>
  } @else {
    <p [class]="props.labelClasses">{{ props.label | translate }}</p>
  }

  @if (props.value) {
    <p [class]="props.labelClasses">{{ props.value }}</p>
  }
</div>
