<button mat-button class="flex items-center gap-1" [matMenuTriggerFor]="sortMenu">
  <span
    >{{ translationPrefix() + '.label' | translate }}:
    {{
      `${translationPrefix()}.${currentSort().active}${currentSort().direction.charAt(0).toUpperCase() + currentSort().direction.slice(1)}`
        | translate
    }}</span
  >
  <mat-icon>expand_more</mat-icon>
</button>

<mat-menu #sortMenu="matMenu" class="sort-selector">
  @for (option of options() | keyvalue: orderBy(); track option.key) {
    @for (value of option.value; track value) {
      <button
        mat-menu-item
        class="flex items-center gap-1"
        [class.active]="
          currentSort().active === option.key && currentSort().direction === value.direction
        "
        (click)="onSortChange({ active: option.key, direction: value.direction })">
        {{
          `${translationPrefix()}.${option.key}${value.direction.charAt(0).toUpperCase() + value.direction.slice(1)}`
            | translate
        }}
        <mat-icon class="size-[18px]! text-[18px]!">{{ value.icon }}</mat-icon>
      </button>
    }
  }
</mat-menu>
