<main class="flex flex-col">
  @defer {
    <plastik-mat-theme-toggle class="top-md right-md absolute z-10"></plastik-mat-theme-toggle>
  }

  <div class="p-sub flex min-h-screen items-center justify-center contain-layout">
    @let formConfig = facade.formConfig;

    <mat-card
      appearance="raised"
      class="flex max-w-[425px] min-w-[425px] items-center justify-center align-middle shadow-md">
      @defer {
        <mat-card-header>
          <mat-card-title class="gap-sub flex justify-center align-middle">
            @if (logo() && title()) {
              <img
                loading="lazy"
                class="h-[32px] w-[32px] object-contain"
                [attr.alt]="title() || ''"
                [src]="logo()" />
            }
            @if (title()) {
              <h1 class="text-lg">{{ title() }}</h1>
            }
          </mat-card-title>
        </mat-card-header>

        <mat-card-content class="my-sm w-full">
          <plastik-shared-form-feature
            [fields]="formConfig.getConfig() || []"
            [submitConfig]="formConfig.getSubmitFormConfig?.() || {}"
            (changeEvent)="facade.onSubmit($event)">
            <div class="my-sub extraLinks md:my-sm">
              @for (link of facade.extraLinks?.(); track link) {
                <a [routerLink]="link.route">{{ link.label }}</a>
              }
            </div>
          </plastik-shared-form-feature>
        </mat-card-content>

        <mat-card-footer
          class="bg-gray-70 py-sub border-spacing-sm border-t-secondary w-full border-t-2 text-center text-[12px] text-balance text-white">
          <a
            class="hover:text-gray-10 hover:decoration-gray-10"
            target="_self"
            [href]="nameLink()"
            >{{ name() }}</a
          >
          {{ currentDate | date: 'yyyy' }}
        </mat-card-footer>
      }
    </mat-card>
  </div>
</main>
