@let viewConfig = facade.viewConfig();
@let formConfig = facade.formConfig;

<div
  class="gap-sm flex flex-col flex-wrap items-center justify-center md:flex-row md:justify-between">
  <h2 class="h4 gap-sub flex content-center items-center">
    <mat-icon class="size-[40px] text-[40px]">{{ viewConfig?.icon }}</mat-icon>
    <span>{{ viewConfig?.title | titlecase }}</span>
  </h2>
</div>

<div class="gap-sm mt-sm flex flex-col flex-wrap items-start justify-start md:justify-between">
  <h3 class="h5">Actualitzar perfil</h3>

  <plastik-shared-form-feature
    class="block w-full"
    [ngClass]="{ 'xxl:w-1/2 lg:w-10/12': !formConfig.getFormFullWidth }"
    [fields]="formConfig.getConfig() || []"
    [model]="facade.model?.() || {}"
    [submitConfig]="formConfig.getSubmitFormConfig?.(!!facade.model?.()) || {}"
    (temporaryChangeEvent)="facade.onFormTemporaryChange?.($event)"
    (pendingChangesEvent)="pendingChanges.set($event)"
    (changeEvent)="facade.onSubmit($event)">
  </plastik-shared-form-feature>
</div>
