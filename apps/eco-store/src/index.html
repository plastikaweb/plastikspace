<!doctype html>
<html lang="ca">
  <head>
    <meta charset="utf-8" />
    <base href="/" />

    <link
      href="/fonts/material-icons/material-symbols.css"
      rel="preload"
      as="style"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      " />

    <link
      rel="preload"
      as="style"
      href="/fonts/manrope/manrope.css"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      " />

    <link
      rel="preload"
      as="style"
      href="/styles.css"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      " />

    <title>Botiga Eco - Productes ecològics i sostenibles</title>

    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
  </head>

  <body
    class="mat-typography bg-tertiary-50 md:from-primary-50 md:to-tertiary-100 h-screen w-screen overflow-hidden md:bg-linear-to-b/oklch md:from-20%">
    <eco-root>
      <div
        class="pointer-events-none absolute top-0 right-0 bottom-0 left-0 flex items-center justify-center"
        role="status"
        aria-live="polite"
        id="loading-container">
        <div class="flex flex-col items-center justify-center gap-6 p-12">
          <!-- Main container -->
          <div class="relative flex h-24 w-24 items-center justify-center">
            <!-- Ripples -->
            <div
              class="bg-primary-900 ping-slow absolute inset-0 rounded-full opacity-20"
              aria-hidden="true"></div>
            <div
              class="bg-primary-900 absolute inset-0 animate-pulse rounded-full opacity-30"
              aria-hidden="true"></div>

            <!-- Icon container -->
            <div
              class="bg-primary-100 rounded-full p-5 shadow-lg backdrop-blur-sm"
              aria-hidden="true">
              <svg
                width="32"
                height="32"
                fill="none"
                stroke="none"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-miterlimit="10"
                class="text-primary-500 fill-primary-500 breathing"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24">
                <path
                  d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z" />
              </svg>
            </div>
          </div>

          <!-- Loading text -->
          <span
            id="static-loading-text"
            class="text-primary-900 animate-pulse text-xs font-bold tracking-[0.2em] uppercase"
            aria-live="polite">
          </span>
        </div>
      </div>

      <script>
        (function () {
          const translations = {
            ca: 'CARREGANT DADES...',
            es: 'CARGANDO DATOS...',
            en: 'LOADING DATA...',
          };

          const browserLang = navigator.language.split('-')[0];
          const lang = browserLang || 'en';
          const text = document.getElementById('static-loading-text');
          const container = document.getElementById('loading-container');
          const translation = translations[lang];

          if (text && translation) {
            text.innerText = translation;
          }

          if (container && translation) {
            container.setAttribute('aria-label', translation);
          }
        })();
      </script>
    </eco-root>
  </body>
</html>
