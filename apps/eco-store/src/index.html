<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <base href="/" />

    <link
      href="/fonts/material-icons/material-symbols.css"
      rel="preload"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'" />

    <link
      rel="preload"
      as="style"
      href="/fonts/manrope/manrope.css"
      onload="this.onload=null;this.rel='stylesheet'" />

    <link
      rel="preload"
      as="style"
      href="/styles.css"
      onload="this.onload=null;this.rel='stylesheet'" />

    <title>eco-store</title>

    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
  </head>

  <body
    class="mat-typography bg-primary-50 md:bg-linear-to-b/oklch md:from-primary-50 md:from-20% md:to-secondary-50 h-screen w-screen overflow-hidden">
    <eco-root role="application">
      <div
        class="flex absolute top-0 right-0 bottom-0 left-0 justify-center items-center pointer-events-none">
        <div class="flex flex-col items-center justify-center gap-6 p-12">
          <!-- Main container -->
          <div class="relative flex items-center justify-center w-24 h-24">
            <!-- Ripples -->
            <div class="absolute inset-0 bg-primary-900 rounded-full opacity-20 ping-slow"></div>
            <div
              class="absolute inset-0 bg-primary-900 rounded-full opacity-30 animate-pulse"></div>

            <!-- Icon container -->
            <div class="p-5 rounded-full bg-primary-100 shadow-lg backdrop-blur-sm">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="32"
                height="32"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="text-primary-700 breathing"
                aria-hidden="true">
                <path
                  d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"
                  class="fill-primary-700"></path>

                <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12" fill="none"></path>
              </svg>
            </div>
          </div>

          <!-- Loading text -->
          <span
            id="static-loading-text"
            class="text-primary-900 font-bold tracking-[0.2em] text-xs uppercase animate-pulse">
          </span>
        </div>
      </div>

      <script>
        (function () {
          const translations = {
            ca: 'CARREGANT DADES...',
            es: 'CARGANDO DATOS...',
            en: 'LOADING DATA...',
          };

          const browserLang = navigator.language.split('-')[0];
          const lang = browserLang || 'en';
          const el = document.getElementById('static-loading-text');
          const translation = translations[lang];

          if (el && translation) {
            el.innerText = translation;
          }
        })();
      </script>
    </eco-root>
  </body>
</html>
