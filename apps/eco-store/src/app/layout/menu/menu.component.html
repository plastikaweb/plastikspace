<ng-template #primaryMenu>
  <nav
    class="flex h-full items-center main-menu"
    [attr.aria-label]="'a11y.main-navigation' | translate">
    <ul class="flex flex-row justify-start items-center gap-4">
      <li class="flex items-center">
        <a
          matButton
          routerLink="/"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          [attr.aria-current]="this.currentUrl() === '/' ? 'page' : null">
          {{ 'menu.home' | translate }}
        </a>
      </li>
      <li class="flex items-center">
        <a
          matButton
          routerLink="/botiga"
          routerLinkActive="active"
          [attr.aria-current]="this.currentUrl().startsWith('/botiga') ? 'page' : null">
          {{ 'menu.store' | translate }}
        </a>
      </li>
      <li class="flex items-center">
        <a
          matButton
          routerLink="/about-us"
          routerLinkActive="active"
          [attr.aria-current]="this.currentUrl().startsWith('/about-us') ? 'page' : null">
          {{ 'menu.about' | translate }}
        </a>
      </li>
    </ul>
  </nav>
</ng-template>

<ng-template #secondaryMenu>
  <nav [attr.aria-label]="'a11y.user-actions' | translate">
    <ul class="flex flex-row items-center gap-4">
      <li>
        <button matIconButton type="button" [aria-label]="'menu.view-favorites' | translate">
          <mat-icon aria-hidden="true">favorite</mat-icon>
        </button>
      </li>
      <li>
        <button
          matButton="outlined"
          type="button"
          [aria-label]="'menu.view-cart' | translate"
          [matBadge]="cartStore.itemsCount()"
          [class.bump]="bumpAnimation()">
          <mat-icon aria-hidden="true">shopping_cart</mat-icon>
          <span>{{ cartStore.totalAmount() | currency }}</span>
        </button>
      </li>
      <li>
        <button matIconButton type="button" [aria-label]="'menu.profile' | translate">
          <mat-icon aria-hidden="true">account_circle</mat-icon>
        </button>
      </li>
    </ul>
  </nav>
</ng-template>
